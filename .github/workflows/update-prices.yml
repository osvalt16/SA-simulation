# .github/workflows/update-prices.yml
# Met a jour market_prices.json (carnet d'ordres en direct du Galactic Marketplace)
# Aucun token personnel : l'Action commit avec le GITHUB_TOKEN integre.
name: Update Marketplace Prices

on:
  schedule:
    - cron: "*/30 * * * *"   # toutes les 30 minutes
  workflow_dispatch: {}        # bouton "Run workflow" manuel

permissions:
  contents: write              # autorise le commit du fichier

concurrency:
  group: update-prices
  cancel-in-progress: true

jobs:
  prices:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          npm init -y
          npm install @solana/web3.js@^1 @staratlas/factory

      - name: Fetch live prices
        env:
          SOLANA_RPC: ${{ secrets.SOLANA_RPC }}
        run: node scripts/fetch-prices.js

      - name: Commit market_prices.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add market_prices.json
          git diff --staged --quiet || git commit -m "Update marketplace prices [skip ci]"
          git push
