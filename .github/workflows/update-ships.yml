name: Update Star Atlas Ships Data

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update-ships:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch ships from Star Atlas API
        run: |
          curl -s "https://galaxy.staratlas.com/nfts" \
            -H "Accept: application/json" \
            -H "User-Agent: Mozilla/5.0" \
            -o raw_nfts.json

      - name: Parse ships data
        run: |
          python3 << 'PYEOF'
          import json
          with open('raw_nfts.json') as f:
              data = json.load(f)
          ships = [i for i in data if i.get('attributes', {}).get('itemType') == 'ship']
          result = {}
          for s in ships:
              n = s.get('name', '').strip()
              img = s.get('image', '')
              thumb = (s.get('media') or {}).get('thumbnailUrl', '') or img
              if n and img:
                  result[n] = {'image': img, 'thumb': thumb}
          with open('ships_images.json', 'w') as f:
              json.dump(result, f)
          print(f"Saved {len(result)} ships")
          PYEOF

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ships_images.json
          git diff --staged --quiet || (git commit -m "Auto-update ships images" && git push)
