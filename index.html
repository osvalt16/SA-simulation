<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SAGE C4 — Galaxy Map</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Share+Tech+Mono&display=swap');
:root{
  --bg:#030810;--panel:#rgba(3,10,22,0.96);--border:rgba(0,180,255,0.2);
  --glow:#00c8ff;--mud:#f0a030;--oni:#e04060;--ust:#30c0f0;
  --text:#8ab0c8;--textb:#cce8f8;--gold:#ffd700;
  --green:#50ff80;--orange:#ffb400;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Share Tech Mono',monospace;overflow:hidden;height:100vh;width:100vw}

/* ─ HEADER ─ */
#hdr{position:fixed;top:0;left:0;right:0;height:46px;z-index:200;background:linear-gradient(180deg,rgba(3,8,18,.98) 60%,transparent);display:flex;align-items:center;padding:0 16px;gap:20px;pointer-events:none}
#hdr h1{font-family:Orbitron,sans-serif;font-size:13px;font-weight:800;letter-spacing:5px;color:var(--glow);text-shadow:0 0 16px rgba(0,200,255,.6)}
#hdr .info{font-size:9px;color:var(--text);letter-spacing:1px}

/* tabs removed */

/* ─ CANVAS ─ */
#cv{display:block;width:100vw;height:100vh;cursor:grab}
#cv:active{cursor:grabbing}

/* ─ CONTROLS ─ */
#ctrl{position:fixed;bottom:18px;left:18px;z-index:100;display:flex;flex-direction:column;gap:6px}
.cbtn{background:rgba(3,10,22,.9);border:1px solid var(--border);color:var(--text);font-family:'Share Tech Mono',monospace;font-size:10px;padding:6px 12px;cursor:pointer;letter-spacing:2px;transition:all .2s;backdrop-filter:blur(8px)}
.cbtn:hover,.cbtn.on{border-color:var(--glow);color:var(--glow);box-shadow:0 0 8px rgba(0,200,255,.2)}
#bgps{border-color:rgba(80,255,120,.3);color:rgba(80,255,120,.7)}
#bgps:hover,#bgps.on{border-color:var(--green);color:var(--green);box-shadow:0 0 10px rgba(80,255,120,.25)}

/* ─ LEGEND ─ */
#leg{position:fixed;bottom:18px;right:18px;z-index:100;background:rgba(3,10,22,.9);border:1px solid var(--border);backdrop-filter:blur(8px);padding:10px 14px;display:flex;gap:14px;font-size:9px;letter-spacing:1px}
.li{display:flex;align-items:center;gap:5px}
.ld{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* ─ TOOLTIP ─ */
#tip{position:fixed;pointer-events:none;background:rgba(3,10,22,.95);border:1px solid rgba(0,200,255,.3);padding:7px 12px;font-size:10px;letter-spacing:1px;color:var(--textb);z-index:300;display:none;white-space:nowrap;backdrop-filter:blur(8px)}

/* ─ GPS STATUS ─ */
#gpsmsg{position:fixed;top:52px;left:50%;transform:translateX(-50%);z-index:150;background:rgba(3,10,22,.93);border:1px solid rgba(80,255,120,.4);padding:7px 18px;font-size:10px;letter-spacing:2px;color:#80ffaa;backdrop-filter:blur(8px);display:none;white-space:nowrap;text-shadow:0 0 8px rgba(80,255,120,.4)}

/* ─ ROUTE PANEL ─ */
#rp{position:fixed;bottom:0;left:0;right:0;z-index:130;background:rgba(3,10,22,.97);border-top:1px solid rgba(80,255,120,.3);backdrop-filter:blur(12px);transform:translateY(100%);transition:transform .35s cubic-bezier(.16,1,.3,1);max-height:55vh;display:flex;flex-direction:column}
#rp.open{transform:translateY(0)}
#rph{display:flex;align-items:center;gap:10px;padding:9px 16px;border-bottom:1px solid rgba(80,255,120,.15);flex-shrink:0}
#rpttl{font-family:Orbitron,sans-serif;font-size:11px;color:#80ffaa;letter-spacing:3px;flex-shrink:0}
#rpft{font-size:9px;color:var(--text);letter-spacing:1px;flex:1}
#fltstbtn{background:rgba(255,180,0,.1);border:1px solid rgba(255,180,0,.4);color:var(--orange);font-family:'Share Tech Mono',monospace;font-size:9px;padding:4px 12px;cursor:pointer;letter-spacing:2px;transition:all .2s;flex-shrink:0}
#fltstbtn:hover:not(:disabled){background:rgba(255,180,0,.2);border-color:var(--orange)}
#fltstbtn:disabled{opacity:.25;cursor:not-allowed}
#rpcls{background:none;border:1px solid rgba(80,255,120,.25);color:#80ffaa;font-family:'Share Tech Mono',monospace;font-size:10px;padding:3px 9px;cursor:pointer;letter-spacing:2px;margin-left:6px}
#rpcls:hover{border-color:var(--green)}
#rpopts{display:flex;flex:1;overflow:hidden}
.ropt{flex:1;padding:12px 16px;overflow-y:auto;border-right:1px solid rgba(80,255,120,.12);cursor:pointer;transition:background .2s}
.ropt:last-child{border-right:none}
.ropt:hover{background:rgba(80,255,120,.04)}
.ropt.sel{background:rgba(80,255,120,.07)}
.ropt::-webkit-scrollbar{width:3px}
.ropt::-webkit-scrollbar-thumb{background:rgba(80,255,120,.3)}
.rttl{font-family:Orbitron,sans-serif;font-size:10px;font-weight:600;margin-bottom:2px}
.rsub{font-size:8px;letter-spacing:2px;margin-bottom:9px}
.rstats{display:flex;gap:14px;margin-bottom:9px;flex-wrap:wrap}
.rst{display:flex;flex-direction:column;gap:1px}
.rstl{font-size:7px;letter-spacing:2px;color:#4a8}
.rstv{font-size:11px;color:#c0ffd8}
.rsteps{font-size:8px;line-height:2;letter-spacing:.5px;word-break:break-word}
.slane{color:#00c8ff}
.sprox{color:#60d060}
.sorig,.sdest{color:var(--gold);font-weight:bold}
.sarw{color:#4a8;margin:0 4px}

/* ─ FLEET PANEL ─ */
#fltp{position:fixed;left:0;top:0;bottom:0;width:300px;background:rgba(3,10,22,.97);border-right:1px solid rgba(255,180,0,.2);backdrop-filter:blur(12px);z-index:135;transform:translateX(-100%);transition:transform .3s cubic-bezier(.16,1,.3,1);display:flex;flex-direction:column}
#fltp.open{transform:translateX(0)}
#fltph{padding:54px 14px 10px;border-bottom:1px solid rgba(255,180,0,.2);flex-shrink:0;display:flex;align-items:center;gap:8px}
#fltph h3{font-family:Orbitron,sans-serif;font-size:11px;color:var(--orange);letter-spacing:3px;flex:1}
#fltcls{background:none;border:1px solid rgba(255,180,0,.3);color:var(--orange);font-family:'Share Tech Mono',monospace;font-size:10px;padding:3px 8px;cursor:pointer;letter-spacing:2px}
#fltcls:hover{border-color:var(--orange)}
#fltcapbar{padding:8px 14px;border-bottom:1px solid rgba(255,180,0,.12);flex-shrink:0;display:flex;align-items:center;gap:7px;font-size:9px;letter-spacing:1px}
#fltcapinp{background:rgba(255,180,0,.07);border:1px solid rgba(255,180,0,.2);color:#ffcc60;font-family:'Share Tech Mono',monospace;font-size:9px;padding:3px 7px;width:60px;outline:none;text-align:center}
#fltcapinp:focus{border-color:var(--orange)}
#capbg{flex:1;height:4px;background:rgba(255,180,0,.1);border-radius:2px;overflow:hidden}
#capfill{height:100%;background:var(--orange);width:0%;transition:width .2s;border-radius:2px}
#cappct{color:#ffcc60;min-width:32px;text-align:right;font-size:9px}
.cap-ok{color:var(--green)!important}.cap-warn{color:#ffaa00!important}.cap-over{color:#ff4040!important}
#fltsrch{padding:8px 14px;border-bottom:1px solid rgba(255,180,0,.1);flex-shrink:0}
#fltsrch input{width:100%;background:rgba(255,180,0,.06);border:1px solid rgba(255,180,0,.18);color:#ffe0a0;font-family:'Share Tech Mono',monospace;font-size:10px;padding:5px 9px;outline:none;letter-spacing:1px}
#fltsrch input:focus{border-color:var(--orange)}
#fltcats{display:flex;flex-wrap:wrap;gap:4px;padding:7px 14px;border-bottom:1px solid rgba(255,180,0,.1);flex-shrink:0}
.fcat{background:rgba(255,180,0,.05);border:1px solid rgba(255,180,0,.12);color:rgba(200,140,60,.7);font-family:'Share Tech Mono',monospace;font-size:8px;padding:3px 7px;cursor:pointer;letter-spacing:1px;transition:all .15s}
.fcat:hover,.fcat.on{border-color:var(--orange);color:var(--orange);background:rgba(255,180,0,.1)}
#fltlist{flex:1;overflow-y:auto;padding:7px}
#fltlist::-webkit-scrollbar{width:3px}
#fltlist::-webkit-scrollbar-thumb{background:rgba(255,180,0,.3)}
.frow{display:flex;align-items:center;gap:7px;padding:6px 9px;margin-bottom:3px;background:rgba(255,180,0,.04);border:1px solid rgba(255,180,0,.1);cursor:default;transition:all .15s}
.frow.inf{border-color:rgba(255,180,0,.45);background:rgba(255,180,0,.09)}
.frn{flex:1}
.frna{font-size:10px;color:#ffe0a0;letter-spacing:.5px}
.frns{font-size:8px;color:rgba(200,140,60,.6);letter-spacing:1px}
.fqty{display:flex;align-items:center;gap:3px}
.qb{background:none;border:1px solid rgba(255,180,0,.3);color:var(--orange);width:20px;height:20px;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.qb:hover{background:rgba(255,180,0,.15);border-color:var(--orange)}
.qd{min-width:22px;text-align:center;font-size:11px;color:#ffcc60;font-family:'Share Tech Mono',monospace}
#fltsum{padding:8px 14px;border-top:1px solid rgba(255,180,0,.2);flex-shrink:0;font-size:9px;letter-spacing:1px;color:#ffe0a0}

/* ─ FLEET TOGGLE ─ */
/* ftoggle css removed */
#bflt{background:rgba(3,10,22,.92);border:1px solid rgba(255,180,0,.4);color:rgba(255,180,0,.8);font-family:'Share Tech Mono',monospace;font-size:10px;padding:6px 12px;cursor:pointer;letter-spacing:2px;transition:all .2s;backdrop-filter:blur(8px)}
#bflt:hover,.bflt.on{border-color:var(--orange);color:var(--orange);box-shadow:0 0 10px rgba(255,180,0,.2)}

/* ─ DETAIL PANEL (right) ─ */
#panel{position:fixed;right:0;top:0;bottom:0;width:300px;background:rgba(3,10,22,.96);border-left:1px solid var(--border);backdrop-filter:blur(12px);z-index:50;transform:translateX(100%);transition:transform .3s cubic-bezier(.16,1,.3,1);display:flex;flex-direction:column;overflow:hidden}
#panel.open{transform:translateX(0)}
#pnlhdr{padding:54px 14px 10px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;gap:8px}
#pnlttl{flex:1;font-family:Orbitron,sans-serif;font-size:11px;color:var(--textb);font-weight:600}
#pnlcls{background:none;border:1px solid var(--border);color:var(--text);font-family:'Share Tech Mono',monospace;font-size:10px;padding:3px 8px;cursor:pointer;letter-spacing:2px}
#pnlcls:hover{border-color:var(--glow);color:var(--glow)}
#pnlscr{flex:1;overflow-y:auto;padding:12px 14px}
#pnlscr::-webkit-scrollbar{width:3px}
#pnlscr::-webkit-scrollbar-thumb{background:rgba(0,200,255,.25)}
.sec{margin-bottom:13px;padding-bottom:13px;border-bottom:1px solid rgba(0,180,255,.1)}
.sec:last-child{border-bottom:none}
.slbl{font-size:8px;letter-spacing:3px;color:var(--glow);text-transform:uppercase;margin-bottom:5px}
.sval{font-size:12px;color:var(--textb);line-height:1.5}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:5px 10px}
.si{display:flex;flex-direction:column;gap:1px}
.sil{font-size:7px;color:var(--glow);letter-spacing:2px}
.siv{font-size:11px;color:var(--textb)}
.piprow{display:flex;gap:3px;margin-top:4px}
.pip{width:18px;height:5px;background:rgba(0,200,255,.1);border:1px solid rgba(0,200,255,.18)}
.pip.on{background:var(--glow);border-color:var(--glow);box-shadow:0 0 5px var(--glow)}
.res-list{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px}
.res{font-size:8px;padding:2px 5px;letter-spacing:.5px;white-space:nowrap;border-radius:1px}
.r1{background:rgba(80,120,160,.2);color:#6090b0;border:1px solid rgba(80,120,160,.3)}
.r2{background:rgba(0,160,200,.18);color:#40c0d8;border:1px solid rgba(0,160,200,.3)}
.r3{background:rgba(0,200,160,.18);color:#30e0b0;border:1px solid rgba(0,200,160,.35)}
.r4{background:rgba(255,180,0,.18);color:#ffcc40;border:1px solid rgba(255,180,0,.45)}
.ptype{font-size:8px;color:var(--glow);letter-spacing:1px;margin-bottom:4px}

/* ─ SHIP TAB ─ */
#stab{position:fixed;inset:0;z-index:90;background:var(--bg);display:none;flex-direction:column;padding-top:46px}
#stab.vis{display:flex}
#stbar{display:flex;align-items:center;gap:10px;padding:9px 18px;border-bottom:1px solid var(--border);flex-wrap:wrap;flex-shrink:0}
#stsrch{background:rgba(0,150,200,.07);border:1px solid rgba(0,150,200,.2);color:var(--textb);font-family:'Share Tech Mono',monospace;font-size:10px;padding:5px 10px;outline:none;letter-spacing:1px;width:180px}
#stsrch:focus{border-color:var(--glow)}
#stcats{display:flex;flex-wrap:wrap;gap:4px}
.scat{background:rgba(0,150,200,.07);border:1px solid rgba(0,150,200,.18);color:var(--text);font-family:'Share Tech Mono',monospace;font-size:8px;padding:3px 9px;cursor:pointer;letter-spacing:1.5px;transition:all .18s}
.scat:hover,.scat.on{border-color:var(--glow);color:var(--glow);background:rgba(0,200,255,.1)}
#stcnt{margin-left:auto;font-size:9px;color:var(--text);letter-spacing:1px}
#sgrid{flex:1;overflow-y:auto;padding:14px 18px;display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:11px;align-content:start}
#sgrid::-webkit-scrollbar{width:4px}
#sgrid::-webkit-scrollbar-thumb{background:rgba(0,200,255,.2)}
.scard{background:rgba(0,150,200,.05);border:1px solid rgba(0,150,200,.16);padding:13px;cursor:pointer;transition:all .18s;position:relative;overflow:hidden}
.scard::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--ac,#444)}
.scard:hover{border-color:rgba(0,200,255,.4);background:rgba(0,200,255,.09)}
.scard-hdr{display:flex;align-items:flex-start;gap:8px;margin-bottom:8px}
.scard-nm{font-family:Orbitron,sans-serif;font-size:11px;font-weight:600;color:var(--textb)}
.scard-sub{font-size:9px;color:var(--text);letter-spacing:1px;margin-top:2px}
.sclsbdg{font-size:8px;padding:2px 7px;background:rgba(0,200,255,.1);border:1px solid rgba(0,200,255,.28);color:var(--glow);letter-spacing:1px;flex-shrink:0}
.tier-sel{appearance:none;-webkit-appearance:none;background:rgba(0,200,255,.09);border:1px solid rgba(0,200,255,.32);color:var(--glow);font-family:'Share Tech Mono',monospace;font-size:9px;padding:2px 20px 2px 7px;cursor:pointer;outline:none;transition:all .15s;position:relative}
.tier-sel:hover,.tier-sel:focus{border-color:var(--glow);background:rgba(0,200,255,.16)}
.tsw{position:relative;display:inline-flex;align-items:center}
.tsa{position:absolute;right:4px;top:50%;transform:translateY(-50%);color:var(--glow);font-size:8px;pointer-events:none}
.sst{display:grid;grid-template-columns:1fr 1fr;gap:4px 10px}
.sr{display:flex;justify-content:space-between;align-items:center}
.sl{font-size:8px;color:var(--text);letter-spacing:1px}
.sv{font-size:9px;color:var(--textb)}
.dlt-up{color:var(--green);font-size:8px;margin-left:3px}
.dlt-dn{color:#ff6040;font-size:8px;margin-left:3px}
.bwrap{grid-column:1/-1;margin-top:3px}
.blbl{font-size:7px;color:var(--text);letter-spacing:1px;display:flex;justify-content:space-between;margin-bottom:2px}
.bbar{height:3px;background:rgba(0,200,255,.1);border-radius:1px;overflow:hidden}
.bfill{height:100%;border-radius:1px}

/* ─ SHIP DETAIL TIER ─ */
.tier-btns{display:flex;gap:4px;margin-top:5px;flex-wrap:wrap}
.tbtn{background:rgba(0,150,200,.07);border:1px solid rgba(0,150,200,.2);color:var(--text);font-family:'Share Tech Mono',monospace;font-size:8px;padding:4px 10px;cursor:pointer;letter-spacing:1px;flex:1;transition:all .15s}
.tbtn:hover{border-color:var(--glow);color:var(--glow)}
.tbtn.on{background:rgba(0,200,255,.15);border-color:var(--glow);color:var(--glow)}

/* ─ FLEET STATS IN ROUTE ─ */
.fstblk{margin-top:11px;padding:9px;background:rgba(255,180,0,.05);border:1px solid rgba(255,180,0,.18)}
.fstttl{font-family:Orbitron,sans-serif;font-size:9px;color:var(--orange);letter-spacing:2px;margin-bottom:7px}
.fship{margin-bottom:7px;padding-bottom:7px;border-bottom:1px solid rgba(255,180,0,.1)}
.fship:last-child{border-bottom:none;margin:0;padding:0}
.fshn{font-size:9px;color:#ffe0a0;letter-spacing:1px;margin-bottom:3px}
.fshg{display:grid;grid-template-columns:1fr 1fr;gap:3px 10px}
.fshi{display:flex;justify-content:space-between}
.fshl{font-size:7px;color:#a06020;letter-spacing:1px}
.fshv{font-size:8px;color:#ffe0a0}
.fshv.ok{color:var(--green)}.fshv.warn{color:#ff6040}
.ftot{margin-top:7px;padding-top:7px;border-top:1px solid rgba(255,180,0,.22);display:grid;grid-template-columns:1fr 1fr;gap:3px 10px}

/* ─ LOADING ─ */
#load{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px}
#load h2{font-family:Orbitron,sans-serif;font-size:14px;letter-spacing:6px;color:var(--glow)}
#lbar{width:200px;height:2px;background:rgba(0,200,255,.15)}
#lfill{height:100%;width:0%;background:var(--glow);transition:width .3s;box-shadow:0 0 8px var(--glow)}

  #flt-spec, #flt-size {
    background: rgba(5,15,30,0.97) !important;
    color: #ffe0a0 !important;
  }
  #flt-spec option, #flt-size option {
    background: #050f1e !important;
    color: #ffe0a0 !important;
  }
  #flt-spec option:hover, #flt-size option:hover,
  #flt-spec option:checked, #flt-size option:checked {
    background: #0a2040 !important;
    color: #ffcc60 !important;
  }


  #flt-reset {
    background:none;border:1px solid rgba(255,60,60,.35);color:rgba(255,100,100,.7);
    font-family:'Share Tech Mono',monospace;font-size:9px;padding:4px 10px;
    cursor:pointer;letter-spacing:2px;transition:all .2s;white-space:nowrap;flex-shrink:0;
  }
  #flt-reset:hover{border-color:#ff4040;color:#ff6060;box-shadow:0 0 8px rgba(255,60,60,.2);}


  .frow.cap-full .qb:last-child {
    opacity:0.25;cursor:not-allowed;pointer-events:none;
  }


  #st-spec, #st-size {
    background:#050f1e !important;
    color:var(--glow) !important;
  }
  #st-spec option, #st-size option {
    background:#050f1e !important;
    color:var(--textb) !important;
  }

</style>
</head>
<body>

<div id="load">
  <h2>SAGE C4</h2>
  <div style="font-size:10px;letter-spacing:3px;color:var(--text)">CHARGEMENT DE LA CARTE</div>
  <div style="font-size:9px;letter-spacing:2px;color:rgba(0,200,255,.4);margin-top:4px" id="load-status">Initialisation...</div>
  <div id="lbar"><div id="lfill"></div></div>
</div>

<div id="hdr">
  <h1>SAGE C4 // GALAXY MAP</h1>
  <div class="info">945 SYSTÈMES · 69 RÉGIONS · 3 FACTIONS · 291 ROUTES</div>
</div>


<canvas id="cv"></canvas>

<!-- GPS status -->
<div id="gpsmsg"></div>

<!-- Route panel -->
<div id="rp">
  <div id="rph">
    <div id="rpttl">◉ ITINÉRAIRE GPS</div>
    <div id="rpft"></div>
    <button id="fltstbtn" disabled onclick="computeFleetStats()">⚓ STATS FLOTTE</button>
    <button id="rpcls" onclick="closeRoute()">✕</button>
  </div>
  <div id="rpopts"></div>
</div>


<!-- Fleet panel -->
<div id="fltp">
  <div id="fltph"><h3>⚓ FLOTTE</h3><button id="fltcls" onclick="toggleFleet()">✕</button></div>
  <div id="fltcapbar">
    <span style="color:rgba(200,140,60,.7)" title="XXS=5 XS=10 S=20 M=40 L=80 Cap=160 Cmd=250 Titan=290">CAP (?)</span>
    <input id="fltcapinp" type="number" value="290" min="1" max="290" oninput="updateCap()">
    <span style="color:rgba(200,140,60,.5)">/ 290 pts</span>
    <div id="capbg"><div id="capfill"></div></div>
    <span id="cappct">0%</span>
  </div>
  <div id="fltsrch"><input type="text" placeholder="Filtrer..." oninput="renderFltList()"></div>
  <div id="fltdrops" style="display:flex;gap:6px;padding:7px 14px;border-bottom:1px solid rgba(255,180,0,.1);flex-shrink:0">
    <div style="flex:1;position:relative">
      <select id="flt-spec" onchange="renderFltList()" style="width:100%;appearance:none;-webkit-appearance:none;background:rgba(5,15,30,0.97);border:1px solid rgba(255,180,0,.35);color:#ffe0a0;font-family:Share Tech Mono,monospace;font-size:9px;padding:5px 24px 5px 9px;outline:none;cursor:pointer;letter-spacing:1px">
        <option value="all">TOUS LES SPECS</option>
      </select>

<script>
// ════════════════════════════════════════════════════
// DATA CONSTANTS
// ════════════════════════════════════════════════════





// ════════════════════════════════════════════════════
// GLOBALS
// ════════════════════════════════════════════════════
let MAP=null, GRAPH=null, SHIPS=null, HULLS=null;
let canvas, ctx, W, H;
let vx=0, vy=0, scale=1;
let dragging=false, dragMoved=false, lmx=0, lmy=0;
let colorMode='resources';
let hovSys=null, selSys=null;
let gpsMode=false, gpsFrom=null, gpsHighlight=null;
let activeRoutes=null, selRoute=0;
let fleet={}, fltCat='all';
let shipTabCat='all';
let detailShip=null, detailTier=0;
let _shipGridList=[];

const XMIN=-51,XMAX=52,YMIN=-46,YMAX=47;
const MW=XMAX-XMIN, MH=YMAX-YMIN;

const FCOLORS={'MUD':'#f0a030','ONI':'#e04060','UST':'#30c0f0'};
const TIER_COLORS=['#1a2a3a','#1e5070','#1080b0','#20b0d8','#40d8ff','#88eeff'];
const SPEC_ICONS={'Fighter':'⚔','Bomber':'💣','Bounty Hunter':'🎯','Miner':'⛏','Freight':'📦','Transport':'🚛','Racer':'⚡','Data Runner':'📡','Rescue':'🚑','Repair':'🔧','Refuel/Repair':'🔧','Salvage':'♻','Multi-Role':'🔀'};
const SPEC_COLORS={'Fighter':'#e04060','Bomber':'#ff6030','Bounty Hunter':'#c040e0','Miner':'#a0b030','Freight':'#50a0d0','Transport':'#30c090','Racer':'#f0d030','Data Runner':'#4060e0','Rescue':'#30e0a0','Repair':'#50c0ff','Refuel/Repair':'#50c0ff','Salvage':'#e08030','Multi-Role':'#d0d0d0'};
const CLASS_PTS={1:5,2:10,3:20,4:40,5:80,6:160,7:250,8:250,9:290};
const PTYPE_NAMES=['Volcanique','Rocheuse','Désertique','Océanique','Toundra','Ombre','Spectrale','Gazeuse','Terrestre','Lave','Cratères','Rocky Dense','Glace','Arctique','Sombre','Aquatique','Tempête','Aride','Glaciale','Lune','Géante','Lune Dense','Nébuleuse','Astéroïde'];

// Tier key: ship field → tier data field
const TK={hp:'hit_points',shield:'shield_points',dmg:'damage',cargo:'cargo_capacity',fuel_cap:'fuel_capacity',ammo_cap:'ammo_capacity',warp_speed:'warp_speed',subwarp_speed:'subwarp_speed',max_warp_dist:'max_warp_distance',warp_fuel:'warp_fuel_consumption',subwarp_fuel:'subwarp_fuel_consumption',warp_lane_speed:'warp_lane_speed',warp_lane_fee:'warp_lane_fee',warp_spool:'warp_spool_time',scan:'scan_power',mining:'asteroid_mining_rate',repair_ability:'repair_ability',crew:'required_crew'};

let MAX_HP=1,MAX_SH=1,MAX_CG=1,MAX_DMG=1,MAX_MN=1;

// ════════════════════════════════════════════════════
// DATA LOADING (external JSON files)
// ════════════════════════════════════════════════════

// Version tag for cache busting — update this when you upload new data files
const DATA_VERSION = Date.now(); // auto-bust on each page load

async function loadJSON(path){
  const res = await fetch(path + '?v=' + DATA_VERSION);
  if(!res.ok) throw new Error('Failed to load ' + path + ' (' + res.status + ')');
  return res.json();
}

// ════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════
// ════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════
async function init(){
  setP(5);
  try{
    if(document.getElementById('load-status')) document.getElementById('load-status').textContent='Chargement carte...';
    MAP   = await loadJSON('map_data.json');   setP(30);
    if(document.getElementById('load-status')) document.getElementById('load-status').textContent='Chargement graphe...';
    GRAPH = await loadJSON('graph_data.json'); setP(55);
    if(document.getElementById('load-status')) document.getElementById('load-status').textContent='Chargement vaisseaux...';
    SHIPS = await loadJSON('ships_data.json'); setP(75);
    if(document.getElementById('load-status')) document.getElementById('load-status').textContent='Chargement régions...';
    HULLS = await loadJSON('hulls_data.json'); setP(95);
  }catch(e){
    document.getElementById('load').innerHTML='<div style="color:#ff4040;font-family:Share Tech Mono,monospace;font-size:12px;text-align:center;padding:40px"><div style="font-size:18px;margin-bottom:16px">⚠ ERREUR DE CHARGEMENT</div><div style="opacity:.8">'+e.message+'</div><div style="margin-top:20px;opacity:.5;font-size:9px;letter-spacing:1px">Vérifiez que map_data.json, graph_data.json,<br>ships_data.json et hulls_data.json<br>sont dans le même dossier que index.html</div></div>';
    return;
  }
  // Recalc maxes
  MAX_HP =Math.max(...SHIPS.map(s=>s.hp));
  MAX_SH =Math.max(...SHIPS.map(s=>s.shield));
  MAX_CG =Math.max(...SHIPS.map(s=>s.cargo));
  MAX_DMG=Math.max(...SHIPS.map(s=>s.dmg));
  MAX_MN =Math.max(...SHIPS.map(s=>s.mining));
  setP(100);
  setTimeout(()=>{
    document.getElementById('load').style.display='none';
    buildStars();
    setupCanvas();
    buildShipCats();
    filterShips();
    buildFleetCats();
    renderFltList();
    draw();
    // Animation loop for GPS pulsing
    function animLoop(){
      if(gpsFrom||gpsHighlight) draw();
      requestAnimationFrame(animLoop);
    }
    animLoop();
  },300);
}
function setP(p){document.getElementById('lfill').style.width=p+'%';}

// ════════════════════════════════════════════════════
// CANVAS / MAP
// ════════════════════════════════════════════════════
function setupCanvas(){
  canvas=document.getElementById('cv');
  ctx=canvas.getContext('2d');
  resize();
  window.addEventListener('resize',resize);
  bindEvents();
}
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;if(MAP)draw();}

function w2s(wx,wy){
  const bx=(wx-XMIN)/MW*W, by=(-wy-YMIN)/MH*H;
  return[(bx-W/2)*scale+W/2+vx,(by-H/2)*scale+H/2+vy];
}
function s2w(sx,sy){
  const bx=(sx-vx-W/2)/scale+W/2, by=(sy-vy-H/2)/scale+H/2;
  return[bx/W*MW+XMIN,-(by/H*MH+YMIN)];
}

let stars=null;
function buildStars(){
  stars=[];
  function h(x){return((Math.sin(x*127.1+311.7)*43758.5453)%1+1)%1;}
  for(let i=0;i<700;i++) stars.push({px:h(i*3.1)*5000,py:h(i*7.3)*5000,r:.2+h(i*2.7)*.8,a:.1+h(i*5.1)*.5});
}
function drawStars(){
  if(!stars) return;
  for(const s of stars){
    const px=((s.px+vx*.015)%W+W)%W, py=((s.py+vy*.015)%H+H)%H;
    ctx.fillStyle=`rgba(160,210,255,${s.a})`;
    ctx.beginPath();ctx.arc(px,py,s.r,0,Math.PI*2);ctx.fill();
  }
}
function drawGrid(){
  ctx.strokeStyle='rgba(0,100,160,.07)';ctx.lineWidth=.5;
  for(let wx=-50;wx<=52;wx+=10){const[x1,y1]=w2s(wx,-46),[x2,y2]=w2s(wx,47);ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();}
  for(let wy=-46;wy<=47;wy+=10){const[x1,y1]=w2s(-51,wy),[x2,y2]=w2s(52,wy);ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();}
}

// Precompute max richness per system index
let _richCache = null;
function getRichCache(){
  if(_richCache) return _richCache;
  _richCache = new Float32Array(MAP.systems.length);
  MAP.systems.forEach((s,i)=>{
    let mx=0;
    for(const p of (s.planets||[])){
      for(const [,rv] of (p.res||[])){
        if(rv>mx) mx=rv;
      }
    }
    _richCache[i]=mx;
  });
  return _richCache;
}

function richColor(v){
  // 1.0→1.9 = grey-blue, 2.0→2.9 = green, 3.0→3.9 = yellow, 4.0+ = orange-red
  // 5 paliers: <1.5 grey, 1.5-2.2 cyan, 2.3-3.0 green, 3.1-3.8 yellow, >3.8 red-orange
  if(v<=0)   return '#2a3040';
  if(v<1.5)  return '#3a5060';   // gris-bleu foncé
  if(v<2.3)  return '#1a8090';   // cyan moyen
  if(v<3.1)  return '#30a050';   // vert
  if(v<3.9)  return '#c0a020';   // jaune-or
  return '#e05010';              // orange-rouge vif
}

function getColor(s,idx){
  if(colorMode==='factions') return FCOLORS[s.f]||'#888';
  if(colorMode==='tier') return s.sb>0?TIER_COLORS[s.sb-1]:'#1a2030';
  if(colorMode==='resources'){
    const cache=getRichCache();
    return richColor(cache[idx!==undefined?idx:MAP.systems.indexOf(s)]);
  }
  return s.rc||'#334';
}

function drawEdges(){
  if(!MAP) return;
  const sys=MAP.systems;
  for(const[i,j] of MAP.edges){
    const a=sys[i],b=sys[j];
    const[ax,ay]=w2s(a.x,a.y),[bx,by]=w2s(b.x,b.y);
    if(Math.max(ax,bx)<-20||Math.min(ax,bx)>W+20) continue;
    if(Math.max(ay,by)<-20||Math.min(ay,by)>H+20) continue;
    const hov=hovSys&&(hovSys.idx===i||hovSys.idx===j);
    const sel=selSys&&(selSys.idx===i||selSys.idx===j);
    ctx.save();
    if(sel){ctx.strokeStyle='rgba(255,220,80,.85)';ctx.lineWidth=2.5;ctx.shadowColor='rgba(255,220,80,.5)';ctx.shadowBlur=8;}
    else if(hov){ctx.strokeStyle='rgba(0,220,255,.65)';ctx.lineWidth=2;ctx.shadowColor='rgba(0,220,255,.35)';ctx.shadowBlur=5;}
    else{ctx.strokeStyle='rgba(0,180,240,.42)';ctx.lineWidth=1.5;ctx.shadowBlur=0;}
    ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(bx,by);ctx.stroke();
    ctx.restore();
  }
}

function drawSystems(){
  if(!MAP) return;
  const sys=MAP.systems;
  const br=scale<.8?2:scale<2?2.5:scale<5?3.5:4.5;
  for(let idx=0;idx<sys.length;idx++){
    const s=sys[idx];
    const[sx,sy]=w2s(s.x,s.y);
    if(sx<-20||sx>W+20||sy<-20||sy>H+20) continue;
    const col=getColor(s,idx);
    const isSel=selSys&&selSys.k===s.k;
    const isHov=hovSys&&hovSys.k===s.k;
    const isFrom=gpsMode&&gpsFrom&&gpsFrom.k===s.k;
    const isHl=gpsHighlight&&s.n===gpsHighlight;
    const r=s.kg?br*1.8:br;
    if(isSel||isHov){
      const g=ctx.createRadialGradient(sx,sy,0,sx,sy,r*6);
      g.addColorStop(0,col+'55');g.addColorStop(1,'transparent');
      ctx.fillStyle=g;ctx.beginPath();ctx.arc(sx,sy,r*6,0,Math.PI*2);ctx.fill();
    }
    // GPS departure: pulsing green glow
    if(isFrom){
      const pulse=0.5+0.5*Math.sin(Date.now()*0.006);
      const grd=ctx.createRadialGradient(sx,sy,0,sx,sy,r*8);
      grd.addColorStop(0,`rgba(80,255,80,${0.4+pulse*0.3})`);
      grd.addColorStop(1,'transparent');
      ctx.fillStyle=grd;ctx.beginPath();ctx.arc(sx,sy,r*8,0,Math.PI*2);ctx.fill();
    }
    // GPS step highlight: fast bright green pulse (3s then fades)
    if(isHl){
      const pulse=0.5+0.5*Math.sin(Date.now()*0.015);
      const grd=ctx.createRadialGradient(sx,sy,0,sx,sy,r*10);
      grd.addColorStop(0,`rgba(80,255,80,${0.6+pulse*0.4})`);
      grd.addColorStop(1,'transparent');
      ctx.fillStyle=grd;ctx.beginPath();ctx.arc(sx,sy,r*10,0,Math.PI*2);ctx.fill();
    }
    ctx.save();
    if(s.kg){
      ctx.translate(sx,sy);ctx.rotate(Math.PI/4);
      ctx.fillStyle=(isFrom||isHl)?'#50ff50':col;
      ctx.shadowColor=(isFrom||isHl)?'#50ff50':col;
      ctx.shadowBlur=(isFrom||isHl)?18:isSel?14:isHov?8:5;
      ctx.fillRect(-r*.85,-r*.85,r*1.7,r*1.7);
      ctx.strokeStyle=isFrom?'#80ff80':'#ffd700';ctx.lineWidth=isSel?1.5:.8;ctx.strokeRect(-r*.85,-r*.85,r*1.7,r*1.7);
    }else{
      ctx.beginPath();ctx.arc(sx,sy,r,0,Math.PI*2);
      ctx.fillStyle=(isFrom||isHl)?'#50ff50':col;
      ctx.shadowColor=(isFrom||isHl)?'#50ff50':col;
      ctx.shadowBlur=(isFrom||isHl)?18:isSel?12:isHov?7:3;ctx.fill();
    }
    ctx.restore();
    if(scale>5||(scale>2&&s.kg)){
      ctx.fillStyle=s.kg?'#ffd700':'rgba(180,225,245,.75)';
      ctx.font=`${s.kg?'600 ':''}${Math.min(s.kg?10:8,scale*1.6)}px Orbitron,monospace`;
      ctx.textAlign='center';ctx.shadowColor=s.kg?'#ffd700':col;ctx.shadowBlur=4;
      ctx.fillText(s.n,sx,sy-r-4);ctx.shadowBlur=0;
    }
  }
}

function drawGPSRoutes(){
  if(!activeRoutes) return;
  const cols=['#50ff80','#00c8ff'];
  for(let ri=0;ri<2;ri++){
    const rt=activeRoutes[ri]; if(!rt) continue;
    const isSel=ri===selRoute, col=cols[ri];
    for(let i=0;i<rt.path.length-1;i++){
      const a=MAP.systems[rt.path[i]], b=MAP.systems[rt.path[i+1]];
      const[ax,ay]=w2s(a.x,a.y),[bx,by]=w2s(b.x,b.y);
      const isLane=rt.steps[i]&&rt.steps[i].type===0;
      ctx.save();
      if(isSel){ctx.strokeStyle=isLane?'#00d8ff':'#50ff80';ctx.lineWidth=4;ctx.shadowColor=isLane?'#00d8ff':'#50ff80';ctx.shadowBlur=12;ctx.setLineDash(isLane?[]:[7,4]);}
      else{ctx.strokeStyle=col+'35';ctx.lineWidth=1.5;ctx.shadowBlur=0;ctx.setLineDash([3,5]);}
      ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(bx,by);ctx.stroke();ctx.restore();
    }
    if(isSel){
      for(let i=0;i<rt.path.length;i++){
        const s=MAP.systems[rt.path[i]];
        const[sx,sy]=w2s(s.x,s.y);
        const isEnd=i===0||i===rt.path.length-1;
        ctx.save();ctx.beginPath();ctx.arc(sx,sy,isEnd?8:4.5,0,Math.PI*2);
        ctx.fillStyle=isEnd?'#ffd700':col;ctx.shadowColor=isEnd?'#ffd700':col;
        ctx.shadowBlur=isEnd?16:8;ctx.fill();ctx.restore();
      }
    }
  }
}

function drawRegionHulls(mode){
  if(!HULLS || !MAP) return;
  const FCOLS = {MUD:'240,150,40', ONI:'220,50,80', UST:'40,180,230'};
  ctx.save();
  for(const r of MAP.regions){
    const rd = HULLS[r.id];
    if(!rd) continue;
    const hull = rd.h || rd;
    if(!hull || hull.length < 3) continue;
    const pts = hull.map(([wx,wy]) => w2s(wx, wy));
    const faction = rd.f || 'UST';
    const isNeutral = rd.n === true;

    let strokeRgb, fillRgb, strokeOpacity, fillOpacity;

    if(isNeutral){
      // Neutral = blanc discret
      strokeRgb = '200,220,240';
      fillRgb   = '180,200,220';
      strokeOpacity = 0.35;
      fillOpacity   = 0.03;
    } else if(mode === 'resources'){
      strokeRgb = FCOLS[faction] || '40,180,230';
      fillRgb   = strokeRgb;
      strokeOpacity = 0.6;
      fillOpacity   = 0.06;
    } else {
      // factions mode: faction colors
      strokeRgb = FCOLS[faction] || '40,180,230';
      fillRgb   = strokeRgb;
      strokeOpacity = 0.6;
      fillOpacity   = 0.06;
    }

    ctx.beginPath();
    ctx.moveTo(pts[0][0], pts[0][1]);
    for(let i=1;i<pts.length;i++) ctx.lineTo(pts[i][0], pts[i][1]);
    ctx.closePath();
    ctx.strokeStyle = `rgba(${strokeRgb},${strokeOpacity})`;
    ctx.lineWidth = isNeutral ? 1 : 1.5;
    ctx.setLineDash(isNeutral ? [3,5] : [6,4]);
    ctx.shadowColor = `rgba(${strokeRgb},0.2)`;
    ctx.shadowBlur = isNeutral ? 2 : 5;
    ctx.stroke();
    ctx.fillStyle = `rgba(${fillRgb},${fillOpacity})`;
    ctx.fill();
    ctx.setLineDash([]);
    ctx.shadowBlur = 0;
  }
  ctx.restore();
}

function draw(){
  if(!canvas) return;
  ctx.clearRect(0,0,W,H);
  if(!MAP) return;
  drawStars();drawGrid();drawEdges();
  if(colorMode==='factions') drawRegionHulls('factions');
  if(colorMode==='resources') drawRegionHulls('resources');
  drawSystems();drawGPSRoutes();
}

function findAt(mx,my){
  const th=Math.max(10,12/scale);
  let best=null,bd=Infinity;
  MAP.systems.forEach((s,idx)=>{
    const[sx,sy]=w2s(s.x,s.y);
    const d=Math.hypot(sx-mx,sy-my);
    if(d<th&&d<bd){bd=d;best={...s,idx};}
  });
  return best;
}

function bindEvents(){
  canvas.addEventListener('mousedown',e=>{dragging=true;dragMoved=false;lmx=e.clientX;lmy=e.clientY;});
  canvas.addEventListener('mousemove',e=>{
    if(dragging){
      const dx=e.clientX-lmx,dy=e.clientY-lmy;
      if(Math.hypot(dx,dy)>3) dragMoved=true;
      vx+=dx;vy+=dy;lmx=e.clientX;lmy=e.clientY;draw();
    }else{
      const s=findAt(e.clientX,e.clientY);
      if(s?.k!==hovSys?.k){hovSys=s;draw();}
      const tip=document.getElementById('tip');
      if(s){tip.style.display='block';tip.style.left=(e.clientX+15)+'px';tip.style.top=(e.clientY-10)+'px';
        tip.innerHTML=`<b>${s.n}</b> · ${s.f} · ${s.rn}${s.kg?' · ★ KING':''}${s.sb?' · SBT'+s.sb:''}`;}
      else tip.style.display='none';
    }
  });
  canvas.addEventListener('mouseup',e=>{
    dragging=false;
    if(!dragMoved){
      if(gpsMode) gpsClick(e.clientX,e.clientY);
      else{const s=findAt(e.clientX,e.clientY);if(s) openSysPanel(s);else closePanel();}
    }
  });
  canvas.addEventListener('mouseleave',()=>{document.getElementById('tip').style.display='none';});
  canvas.addEventListener('wheel',e=>{
    e.preventDefault();
    const f=e.deltaY>0?.85:1/.85;
    vx=(vx-e.clientX)*f+e.clientX;vy=(vy-e.clientY)*f+e.clientY;
    scale=Math.max(.15,Math.min(25,scale*f));draw();
  },{passive:false});
  // Touch
  let t2d=0;
  canvas.addEventListener('touchstart',e=>{e.preventDefault();
    if(e.touches.length===1){dragging=true;dragMoved=false;lmx=e.touches[0].clientX;lmy=e.touches[0].clientY;}
    else if(e.touches.length===2){dragging=false;t2d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);}
  },{passive:false});
  canvas.addEventListener('touchmove',e=>{e.preventDefault();
    if(e.touches.length===1&&dragging){const dx=e.touches[0].clientX-lmx,dy=e.touches[0].clientY-lmy;if(Math.hypot(dx,dy)>3)dragMoved=true;vx+=dx;vy+=dy;lmx=e.touches[0].clientX;lmy=e.touches[0].clientY;draw();}
    else if(e.touches.length===2){const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);const f=d/t2d;const mx=(e.touches[0].clientX+e.touches[1].clientX)/2,my=(e.touches[0].clientY+e.touches[1].clientY)/2;vx=(vx-mx)*f+mx;vy=(vy-my)*f+my;scale=Math.max(.15,Math.min(25,scale*f));t2d=d;draw();}
  },{passive:false});
  canvas.addEventListener('touchend',e=>{
    if(!dragMoved&&e.changedTouches.length===1){const s=findAt(e.changedTouches[0].clientX,e.changedTouches[0].clientY);if(s){if(gpsMode)gpsClick(e.changedTouches[0].clientX,e.changedTouches[0].clientY);else openSysPanel(s);}else closePanel();}
    dragging=false;
  });
}

// Get T5 (max) value for a ship field
function t5Val(s,field){
  if(!s.tiers||!s.tiers[4]) return s[field]||0;
  const tk=TK[field]; if(!tk) return s[field]||0;
  const v=s.tiers[4][tk];
  return (v!==undefined&&v!==null)?v:(s[field]||0);
}

function tv(s,field,tier){
  // Get value for field at given tier (0=BASE=allShips)
  if(tier===0||!s.tiers||!s.tiers[tier-1]) return s[field]??0;
  const tk=TK[field]; if(!tk) return s[field]??0;
  const v=s.tiers[tier-1][tk];
  return (v!==undefined&&v!==null)?v:(s[field]??0);
}
function delta(base,cur){
  if(base===0) return '';
  const pct=Math.round(((cur/base)-1)*100);
  if(Math.abs(pct)<1) return '';
  return pct>0?`<span class="dlt-up">+${pct}%</span>`:`<span class="dlt-dn">${pct}%</span>`;
}
function fmt(v){
  if(v===0) return '0';
  if(Number.isInteger(v)) return v.toString();
  if(v<0.0001) return v.toExponential(2);
  if(v<0.01)   return v.toFixed(4);
  if(v<1)      return v.toFixed(3);
  if(Math.abs(v-Math.round(v))<0.01) return Math.round(v).toString();
  return v.toFixed(2);
}
function bar(val,max,col){
  const pct=Math.min(100,(val/max)*100).toFixed(1);
  return `<div class="bbar"><div class="bfill" style="width:${pct}%;background:${col}"></div></div>`;
}

// Dijkstra
function dijkstra(start,end,costFn){
  const n=MAP.systems.length;
  const dist=new Float32Array(n).fill(Infinity);
  const prev=new Int32Array(n).fill(-1);
  dist[start]=0;
  const heap=[[0,start]];
  const vis=new Uint8Array(n);
  while(heap.length){
    heap.sort((a,b)=>a[0]-b[0]);
    const[cost,u]=heap.shift();
    if(vis[u]) continue; vis[u]=1;
    if(u===end) break;
    for(const[v,etype,d] of (GRAPH[u]||[])){
      const nc=cost+costFn(etype,d);
      if(nc<dist[v]){dist[v]=nc;prev[v]=u;heap.push([nc,v]);}
    }
  }
  if(!isFinite(dist[end])) return null;
  const path=[]; let cur=end;
  while(cur!==-1){path.push(cur);cur=prev[cur];}
  return path.reverse();
}
function buildRoute(path){
  if(!path) return null;
  let laneHops=0,proxHops=0,totalDist=0;
  const steps=[];
  for(let i=0;i<path.length-1;i++){
    const a=path[i],b=path[i+1];
    let etype=1,d=0;
    for(const[v,et,ed] of (GRAPH[a]||[])){if(v===b){etype=et;d=ed;break;}}
    totalDist+=d;
    if(etype===0) laneHops++; else proxHops++;
    steps.push({from:MAP.systems[a].n,to:MAP.systems[b].n,type:etype,dist:d});
  }
  return{path,steps,laneHops,proxHops,totalDist:Math.round(totalDist*100)/100,hops:path.length-1};
}
async function computeRoutes(fi,ti){
  // Route 1: fastest off-lane (pure distance, ignore lane bonus)
  const p1=dijkstra(fi,ti,(et,d)=>d);
  // Route 2: max warp lanes (strongly prefer lanes)
  const p2=dijkstra(fi,ti,(et,d)=>et===0?d*.3:d*60+200);
  return[buildRoute(p1),buildRoute(p2)];
}

  if(!SHIPS) return;

  const sel=document.getElementById('flt-spec');

    sel.innerHTML=specs.map(c=>

function fleetPts(){
  let tot=0;
  for(const[name,qty] of Object.entries(fleet)){const s=SHIPS&&SHIPS.find(x=>x.name===name);if(s)tot+=s.pts*qty;}
  return tot;
}
function updateCap(){
  const cap=parseInt(document.getElementById('fltcapinp').value)||290;
  const used=fleetPts();
  const pct=cap>0?Math.min(100,(used/cap)*100):0;
  const fill=document.getElementById('capfill');
  fill.style.width=pct.toFixed(1)+'%';
  fill.style.background=pct>=100?'#ff4040':pct>=85?'#ffaa00':'var(--orange)';
  const pctEl=document.getElementById('cappct');
  pctEl.textContent=pct.toFixed(0)+'%';
  pctEl.className=pct>=100?'cap-over':pct>=85?'cap-warn':'cap-ok';
  updateFleetSum();
  // Grey out + buttons on all rows if cap is reached
  const cap2=parseInt(document.getElementById('fltcapinp').value)||290;
  const used2=fleetPts();
  document.querySelectorAll('.frow').forEach(row=>{
    const nameEl=row.querySelector('.frna');
    if(!nameEl) return;
    const ship=SHIPS&&SHIPS.find(s=>s.name===nameEl.textContent);
    const pts=ship?ship.pts:999;
    row.classList.toggle('cap-full', used2+pts > cap2 && !(fleet[nameEl.textContent]>0 && used2-pts+pts<=cap2));
  });
}
function updateFleetSum(){
  const tot=Object.values(fleet).reduce((a,b)=>a+b,0);
  const used=fleetPts();
  const cap=parseInt(document.getElementById('fltcapinp').value)||290;
  const over=used>cap;
  const el=document.getElementById('fltsum');
  if(tot===0) el.innerHTML='Flotte vide';
  else if(over) el.innerHTML=`<span class="cap-over">⚠ CAP DÉPASSÉE: ${used}/${cap} pts</span>`;
  else el.innerHTML=`${tot} vaisseau${tot>1?'x':''} · <span class="cap-ok">${used}/${cap} pts</span>`;
  updateFleetBtn();
}
function updateFleetBtn(){
  const tot=Object.values(fleet).reduce((a,b)=>a+b,0);
  const btn=document.getElementById('fltstbtn');
  btn.disabled=tot===0||!activeRoutes;
  const used=fleetPts(), cap=parseInt(document.getElementById('fltcapinp').value)||290;
  btn.textContent=tot===0?'⚓ AJOUTEZ DES VAISSEAUX':!activeRoutes?'⚓ CALCULEZ UN TRAJET':used>cap?'⚓ STATS (⚠ CAP DÉPASSÉE)':'⚓ STATS FLOTTE';
}

function renderFltList(){
  if(!SHIPS) return;
  const q=(document.querySelector('#fltsrch input')||{}).value?.toLowerCase()||'';
  const specSel=document.getElementById('flt-spec');
  const sizeSel=document.getElementById('flt-size');
  const specVal=specSel?specSel.value:'all';

    if(specVal!=='all'&&s.spec!==specVal) return false;

      <div class="frn"><div class="frna">${s.name}</div><div class="frns">${s.mfr} · ${s.spec} · ${s.pts}pts · ${s.size_name}</div></div>
      <div class="fqty">

  }).join('');
}
function setQty(name,d){
  // Block adding if it would exceed cap
  if(d > 0){
    const ship=SHIPS&&SHIPS.find(s=>s.name===name);
    const cap=parseInt(document.getElementById('fltcapinp').value)||290;
    const currentUsed=fleetPts();
    const shipPts=ship?ship.pts:0;
    if(currentUsed+shipPts > cap) return; // blocked
  }
  fleet[name]=Math.max(0,(fleet[name]||0)+d);
  if(fleet[name]===0) delete fleet[name];
  const key=name.replace(/\s/g,'_');
  const qel=document.getElementById('qty-'+key);
  if(qel) qel.textContent=fleet[name]||0;
  const row=document.getElementById('frow-'+key);
  if(row) row.classList.toggle('inf',(fleet[name]||0)>0);
  updateCap();
}

// FLEET STATS CALCULATION (exact)
// ════════════════════════════════════════════════════
function calcShipStats(ship, route, routeIdx){
  // route: {path, steps, laneHops, proxHops, totalDist, hops}
  // routeIdx: 0=off-lane, 1=max-lane
  // All travel values from allShips (BASE) - authoritative real game values
  let fuel=0, time=0, atlas=0, warpJumps=0, laneHops=0;
  for(const step of route.steps){
    const D=step.dist;
    const isLane=step.type===0;
    if(routeIdx===1&&isLane){
      // Warp lane: time = D / warp_lane_speed, fuel = 0, fee = warp_lane_fee
      time+=ship.warp_lane_speed>0?D/ship.warp_lane_speed:0;
      atlas+=ship.warp_lane_fee;
      laneHops++;
    }else{
      // Warp jumps: ceil(D / max_warp_dist) jumps, each costs warp_fuel
      const jumps=ship.max_warp_dist>0?Math.ceil(D/ship.max_warp_dist):1;
      fuel+=jumps*ship.warp_fuel;
      time+=jumps*ship.warp_spool+(ship.warp_speed>0?D/ship.warp_speed:0);
      warpJumps+=jumps;
    }
  }
  const ok=fuel<=ship.fuel_cap;
  return{fuel:Math.round(fuel*10)/10,fuel_cap:ship.fuel_cap,ok,atlas:Math.round(atlas*10)/10,
    time_s:Math.round(time),time_str:fmtTime(Math.round(time)),warpJumps,laneHops,pts:ship.pts,size_name:ship.size_name};
}
function fmtTime(s){if(s<60)return s+'s';if(s<3600)return Math.floor(s/60)+'m '+Math.round(s%60)+'s';return Math.floor(s/3600)+'h '+Math.floor((s%3600)/60)+'m';}

function computeFleetStats(){
  if(!activeRoutes||!SHIPS||!Object.keys(fleet).length) return;
  document.querySelectorAll('.fstblk').forEach(el=>el.remove());

  document.querySelectorAll('.ropt').forEach((panel,ri)=>{
    const rt=activeRoutes[ri]; if(!rt) return;

    // ── Calcul flotte comme une unité ──
    // Le vaisseau avec la plus courte max_warp_dist dicte le nb de sauts pour TOUS
    // Le temps = le plus lent (min warp_speed sur chaque segment)
    // Carburant = somme de tous les vaisseaux
    // ATLAS = somme de tous
    // Limitant = vaisseau avec le moins de fuel_cap relatif

    const ships = Object.entries(fleet).flatMap(([name,qty])=>{
      const s=SHIPS.find(x=>x.name===name); return s?Array(qty).fill(s):[];
    });
    if(!ships.length) return;

    // Vaisseau limitant par warp_dist (le plus court max_warp_dist)
    const minWarpDist = Math.min(...ships.map(s=>s.max_warp_dist));
    // Vaisseau limitant par vitesse (le plus lent warp_speed)
    const minWarpSpeed = Math.min(...ships.map(s=>s.warp_speed));
    const minLaneSpeed = Math.min(...ships.map(s=>s.warp_lane_speed));
    const minSubwarpSpeed = Math.min(...ships.map(s=>s.subwarp_speed));

    // Calculer temps et sauts avec les stats du vaisseau LIMITANT
    let fleetTime=0, fleetWarpJumps=0, fleetLaneHops=0;
    for(const step of rt.steps){
      const D=step.dist;
      const isLane=step.type===0;
      if(ri===1&&isLane){
        fleetTime+=minLaneSpeed>0?D/minLaneSpeed:0;
        fleetLaneHops++;
      }else{
        const jumps=minWarpDist>0?Math.ceil(D/minWarpDist):1;
        // Use slowest ship's spool time
        const maxSpool=Math.max(...ships.map(s=>s.warp_spool));
        fleetTime+=jumps*maxSpool+(minWarpSpeed>0?D/minWarpSpeed:0);
        fleetWarpJumps+=jumps;
      }
    }

    // Carburant total (somme) + carburant par vaisseau unique
    let totalFuel=0, totalAtlas=0;
    const shipStats=[];
    const seenNames=new Set();
    for(const[name,qty] of Object.entries(fleet)){
      const sd=SHIPS.find(s=>s.name===name); if(!sd) continue;
      // Calcul fuel pour CE vaisseau avec les sauts imposés par le vaisseau limitant
      let fuel=0, atlas=0;
      for(const step of rt.steps){
        const D=step.dist;
        const isLane=step.type===0;
        if(ri===1&&isLane){
          atlas+=sd.warp_lane_fee;
        }else{
          const jumps=minWarpDist>0?Math.ceil(D/minWarpDist):1;
          fuel+=jumps*sd.warp_fuel;
        }
      }
      const fuelPerShip=Math.round(fuel*10)/10;
      const fuelTotal=Math.round(fuel*qty*10)/10;
      const atlasTotal=Math.round(atlas*qty*10)/10;
      const ok=fuel<=sd.fuel_cap;
      totalFuel+=fuel*qty;
      totalAtlas+=atlas*qty;
      shipStats.push({name,qty,fuelPerShip,fuelTotal,atlasTotal,ok,fuel_cap:sd.fuel_cap,pts:sd.pts,size_name:sd.size_name});
    }

    const anyWarn=shipStats.some(s=>!s.ok);
    const fleetPtsUsed=fleetPts();

    // ── HTML ──
    const blk=document.createElement('div');
    blk.className='fstblk';

    // Header stats globaux
    let html=`<div class="fstttl">⚓ STATS FLOTTE — ${ships.length} VAISSEAU${ships.length>1?'X':''} · ${fleetPtsUsed}pts</div>`;

    // Bloc principal combiné
    html+=`<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px 10px;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid rgba(255,180,0,.2)">
      <div class="rst"><div class="rstl" style="color:var(--orange)">CARB. TOTAL</div><div class="rstv" style="color:#ffcc60">${Math.round(totalFuel*10)/10}</div></div>
      <div class="rst"><div class="rstl" style="color:var(--orange)">SAUTS WARP</div><div class="rstv" style="color:#ffcc60">${fleetWarpJumps}</div></div>
      <div class="rst"><div class="rstl" style="color:var(--orange)">TEMPS TRAJET</div><div class="rstv" style="color:#ffcc60">${fmtTime(Math.round(fleetTime))}</div></div>
      ${totalAtlas>0?`<div class="rst"><div class="rstl" style="color:var(--orange)">ATLAS FEES</div><div class="rstv" style="color:#ffcc60">${Math.round(totalAtlas*10)/10}</div></div>`:''}
      <div class="rst"><div class="rstl" style="color:var(--orange)">WARP LANES</div><div class="rstv" style="color:#ffcc60">${fleetLaneHops}</div></div>
    </div>`;

    // Vaisseau limitant
    const limitingWarp=ships.find(s=>s.max_warp_dist===minWarpDist);
    const limitingSpeed=ships.find(s=>s.warp_speed===minWarpSpeed);
    html+=`<div style="font-size:8px;color:rgba(255,180,0,.5);letter-spacing:1px;margin-bottom:8px">
      ⚡ Limitant warp dist: <span style="color:#ffcc60">${limitingWarp?limitingWarp.name:'-'}</span> (${minWarpDist} AU/jump) &nbsp;·&nbsp;
      🐢 Limitant vitesse: <span style="color:#ffcc60">${limitingSpeed?limitingSpeed.name:'-'}</span> (${minWarpSpeed} AU/s)
    </div>`;

    // Détail carburant par type de vaisseau
    html+=`<div style="font-size:8px;color:rgba(255,180,0,.6);letter-spacing:2px;margin-bottom:5px">CARBURANT PAR VAISSEAU</div>`;
    for(const s of shipStats){
      const cls=s.ok?'ok':'warn';
      const icon=s.ok?'✓':'⚠';
      html+=`<div class="fshi" style="margin-bottom:3px">
        <span class="fshl">${s.name}${s.qty>1?` ×${s.qty}`:''} <span style="color:rgba(255,180,0,.4)">${s.pts}pts·${s.size_name}</span></span>
        <span class="fshv ${cls}">${icon} ${s.fuelPerShip}/${s.fuel_cap}/ship${s.qty>1?` = ${s.fuelTotal} total`:''}</span>
      </div>`;
    }

    if(anyWarn){
      html+=`<div style="margin-top:8px;padding:6px 8px;background:rgba(255,60,0,.1);border:1px solid rgba(255,60,0,.3);font-size:8px;color:#ff8060;letter-spacing:1px">
        ⚠ ATTENTION: certains vaisseaux manquent de carburant pour ce trajet. Prévoir des arrêts ravitaillement.
      </div>`;
    }

    blk.innerHTML=html;
    panel.appendChild(blk);
  });

  document.getElementById('fltp').classList.remove('open');
}
